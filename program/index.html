<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>选校清单</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="page-shell">
    <header class="page-header">
      <div class="page-title-block">
        <p class="eyebrow">Interactive School List Of Chambers Z.</p>
        <h1>张二狗 Chambers 的选校清单</h1>
        <p id="program-count" class="page-meta">0 Programs In Total</p>
        <button id="unlock-button" class="icon-button unlock-button" type="button" title="登陆" aria-label="登陆按钮">⚙️</button>
      </div>
      <div class="status-panel">
        <span id="save-status" class="save-status hidden"></span>
      </div>
    </header>

    <main id="tier-board" class="tier-board" aria-live="polite"></main>

    <footer class="page-footer">
      <p class="subtitle">A pure static front-end page based on HTML, CSS, and JavaScript, with school programs storage and updates managed through Cloudflare Workers and GitHub Issues.</p>
      <a class="github-link" href="https://github.com/2dog-Z" target="_blank" rel="noreferrer" aria-label="打开 Chambers Z 的 GitHub 主页" title="打开 GitHub 主页">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 1.5C6.2 1.5 1.5 6.2 1.5 12.1c0 4.7 3 8.7 7.2 10.1.5.1.7-.2.7-.5v-1.9c-2.9.6-3.5-1.2-3.5-1.2-.5-1.2-1.2-1.5-1.2-1.5-1-.7.1-.7.1-.7 1.1.1 1.8 1.2 1.8 1.2 1 .1.7 1.8 2.8 1.8.3-.7.4-1.2.7-1.5-2.3-.3-4.8-1.2-4.8-5.2 0-1.1.4-2 1.1-2.8-.1-.3-.5-1.3.1-2.8 0 0 .9-.3 2.9 1.1a9.8 9.8 0 0 1 5.3 0c2-1.4 2.9-1.1 2.9-1.1.6 1.5.2 2.5.1 2.8.7.8 1.1 1.7 1.1 2.8 0 4-2.4 4.9-4.8 5.2.4.3.7 1 .7 2.1v3.1c0 .3.2.7.7.5a10.6 10.6 0 0 0 7.2-10.1C22.5 6.2 17.8 1.5 12 1.5Z"></path>
        </svg>
        <span>GitHub</span>
      </a>
    </footer>
  </div>

  <div id="program-modal" class="modal hidden" aria-hidden="true">
    <div class="modal-backdrop" data-close-modal="true"></div>
    <div class="modal-dialog" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div class="modal-header">
        <h2 id="modal-title">编辑项目</h2>
        <button id="modal-close" class="icon-button subtle" type="button" aria-label="关闭弹窗">×</button>
      </div>
      <form id="program-form" class="modal-form">
        <label>
          <span>项目简称</span>
          <input id="program-short-name" name="shortName" type="text" required maxlength="80">
        </label>

        <label class="school-select-field">
          <span>院校名称</span>
          <div class="school-select-row">
            <div class="logo-frame select-logo-frame">
              <div id="modal-logo-placeholder" class="logo-placeholder"></div>
              <img id="modal-school-logo" alt="" hidden>
            </div>
            <select id="program-school" name="schoolId" required></select>
          </div>
        </label>

        <label>
          <span>项目中文名称</span>
          <input id="program-cn-name" name="cnName" type="text" required maxlength="120">
        </label>

        <label>
          <span>项目英文全称</span>
          <textarea id="program-en-name" name="enName" rows="3" required maxlength="240"></textarea>
        </label>

        <label>
          <span>学制</span>
          <select id="program-duration" name="duration">
            <option value="">未指定</option>
            <option value="1 year">1 year</option>
            <option value="1.5 year">1.5 year</option>
            <option value="2 year">2 year</option>
          </select>
        </label>

        <label>
          <span>项目状态</span>
          <select id="program-status" name="status"></select>
        </label>

        <div class="modal-actions">
          <button id="delete-button" class="action-button danger hidden" type="button">删除</button>
          <div class="spacer"></div>
          <button class="action-button secondary" type="button" data-close-modal="true">取消</button>
          <button id="submit-button" class="action-button primary" type="submit">保存</button>
        </div>
      </form>
    </div>
  </div>

  <div id="unlock-modal" class="modal hidden" aria-hidden="true">
    <div class="modal-backdrop" data-close-unlock-modal="true"></div>
    <div class="modal-dialog modal-dialog--compact" role="dialog" aria-modal="true" aria-labelledby="unlock-modal-title">
      <div class="modal-header">
        <h2 id="unlock-modal-title">Login</h2>
        <button id="unlock-modal-close" class="icon-button subtle" type="button" aria-label="关闭解锁弹窗">×</button>
      </div>
      <form id="unlock-form" class="modal-form">
        <label>
          <input id="unlock-password" name="password" type="password" autocomplete="current-password" required>
        </label>
        <p id="unlock-error" class="modal-error hidden" role="alert"></p>
        <div class="modal-actions">
          <div class="spacer"></div>
          <button class="action-button secondary" type="button" data-close-unlock-modal="true">Cancel</button>
          <button class="action-button primary" type="submit">Login</button>
        </div>
      </form>
    </div>
  </div>

  <template id="tier-template">
    <section class="tier-column">
      <div class="tier-header">
        <div>
          <h2 class="tier-title"></h2>
          <p class="tier-subtitle"></p>
        </div>
        <button class="icon-button tier-add-button" type="button" title="新建项目">✏️</button>
      </div>
      <div class="tier-list"></div>
    </section>
  </template>

  <template id="program-template">
    <article class="program-card" draggable="true">
      <div class="program-content">
        <div class="program-header">
          <div class="logo-frame">
            <div class="logo-placeholder"></div>
            <img class="school-logo" alt="" hidden>
          </div>
          <div class="program-title-group">
            <h3 class="program-title">
              <span class="program-short-name"></span>
              <span class="program-school-group">
                <span class="program-school-name"></span>
                <span class="ranking-badge duration-badge" hidden></span>
              </span>
              <span class="program-rankings">
                <span class="ranking-badge usnews-ranking" title="US News Ranking" hidden>US: <span class="usnews-value"></span></span>
                <span class="ranking-badge qs-ranking" title="QS Ranking" hidden>QS: <span class="qs-value"></span></span>
                <span class="ranking-badge cs-ranking" title="CS Ranking" hidden>CS: <span class="cs-value"></span></span>
              </span>
            </h3>
            <p class="program-subtitle"></p>
          </div>
        </div>
        <p class="program-description">
          <span class="program-cn-name"></span>
          <span class="program-en-name"></span>
        </p>
        <div class="program-status-side">
          <div class="program-progress" aria-label="项目进度"></div>
          <p class="program-status-text"></p>
        </div>
      </div>
      <button class="icon-button program-edit-button" type="button" title="编辑项目">✏️</button>
    </article>
  </template>

  <script src="./script.js"></script>
</body>
</html>
